<!DOCTYPE html>

<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Гайды</title>
<link rel="stylesheet" href="style.css">

<style>

.guides-container{
padding:60px 40px;
text-align:center;
}

.guides-title{
font-size:36px;
margin-bottom:40px;
}

.guides-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.guide-box{
background:white;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.12);
padding:20px;
cursor:pointer;
transition:0.3s;
}

.guide-box:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.guide-box img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.popup-box{
background:white;
padding:30px;
border-radius:10px;
width:500px;
max-width:90%;
text-align:left;
}

.popup-box button{
margin-top:20px;
padding:10px 20px;
background:#1e90a8;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">⚙ PC Builder</div>

<nav>
<a href="index.html">Главная</a>
<a href="components.html">Компоненты</a>
<a href="guides.html">Гайды</a>
<a href="contacts.html">Контакты</a>
</nav>

</header>

<div class="guides-container">

<h1 class="guides-title">Руководства по ПК</h1>

<div class="guides-grid">

<div class="guide-box" onclick="openGuide('build')">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<p>Как собрать ПК</p>
</div>

<div class="guide-box" onclick="openGuide('parts')">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<p>Как выбрать комплектующие</p>
</div>

<div class="guide-box" onclick="openGuide('use')">
<img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
<p>Как пользоваться ПК</p>
</div>

</div>

</div>

<div id="popup" class="popup">

<div class="popup-box">

<h2 id="guideTitle"></h2>

<p id="guideText"></p>

<button onclick="closePopup()">Закрыть</button>

</div>

</div>

<footer>

<p>© 2026 PC Builder</p>

</footer>

<script>

function openGuide(type){

let title=document.getElementById("guideTitle")
let text=document.getElementById("guideText")

if(type==="build"){
title.innerText="Как собрать ПК"
text.innerText="1. Установите процессор на материнскую плату. 2. Установите оперативную память. 3. Закрепите материнскую плату в корпусе. 4. Установите блок питания. 5. Подключите SSD или HDD. 6. Установите видеокарту. 7. Подключите кабели питания."
}

if(type==="parts"){
title.innerText="Как выбрать комплектующие"
text.innerText="Сначала определите бюджет. Затем выберите процессор и совместимую материнскую плату. Подберите оперативную память, видеокарту, SSD и блок питания достаточной мощности."
}

if(type==="use"){
title.innerText="Как пользоваться ПК"
text.innerText="Установите операционную систему, драйверы для видеокарты и материнской платы, затем установите необходимые программы и регулярно обновляйте систему."
}

document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>

</html>
